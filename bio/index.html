    <style>
      :root {
        color-scheme: dark;

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 10% 15%,
            rgba(59, 130, 246, 0.22),
            transparent 44%

          radial-gradient(

            rgba(28, 68, 133, 0.3),
            transparent 38%
          ),
          radial-gradient(
            circle at 70% 84%,
            rgba(56, 189, 248, 0.12),
            transparent 42%
          ),
          linear-gradient(160deg, #0f172a 0%, #10192e 45%, #0f172a 100%);
        background-size: 120% 120%;
        animation: backgroundFlow 22s ease-in-out infinite;
      }

      @keyframes backgroundFlow {
        0%,
        100% {
          background-position:
            0% 50%,
            100% 50%,
            50% 100%,
            50% 50%;
        }
        50% {
          background-position:
            14% 42%,
            90% 66%,
            36% 82%,
            50% 50%;
        }
      }

      .gaussian-orb {
        position: fixed;
        width: 28rem;
        height: 28rem;
        border-radius: 9999px;
        filter: blur(60px);
        opacity: 0.36;
        z-index: 0;
        pointer-events: none;
        transform: translate3d(var(--tx, 0), var(--ty, 0), 0);
        transition: transform 0.2s linear;
      }

      .orb-a {
        background: rgba(59, 130, 246, 0.62);
        top: -8rem;
        right: -8rem;
      }

      .orb-b {
        background: rgba(28, 68, 133, 0.64);
        bottom: -10rem;
        left: -10rem;
      }

      .grain::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.2;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.14) 0.45px,
          transparent 0.45px
        );
        background-size: 3px 3px;
      }

      .card-glass {
        background: rgba(16, 25, 46, 0.48);
        border: 1px solid rgba(203, 213, 225, 0.18);
        box-shadow: 0 12px 42px rgba(2, 8, 23, 0.45);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .card-glass::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0) 45%
        );
        pointer-events: none;
      }

      .reveal {
        opacity: 0;
        transform: translate3d(0, 16px, 0);
        transition:
          opacity 0.65s ease,
          transform 0.65s ease;
      }

      .reveal.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .link-card {
        transform: translateZ(0);
        transition:
          transform 0.35s ease,
          border-color 0.35s ease,
          background-color 0.35s ease;
      }

      .link-card:hover {
        transform: translate3d(0, -3px, 0);
        border-color: rgba(59, 130, 246, 0.5);
        background: rgba(20, 35, 63, 0.68);
      }

      .link-card:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }

      .pulse-promo {
        animation: pulsePromo 3.6s ease-in-out infinite;
      }

      @keyframes pulsePromo {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 0 rgba(56, 189, 248, 0.2));
        }
        50% {
          transform: scale(1.06);
          filter: drop-shadow(0 0 16px rgba(56, 189, 248, 0.45));
        }
      }

      @media (max-width: 640px) {
        .gaussian-orb {
          width: 18rem;
          height: 18rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body,
        .pulse-promo {
          animation: none;
        }

        .reveal,
        .link-card {
          transition: none;
        }
      }
    </style>

    <script>
      const htmlEl = document.documentElement;
      const revealElements = document.querySelectorAll(".reveal");
      const parallaxNodes = document.querySelectorAll("[data-parallax]");

      function applyTheme() {
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        htmlEl.classList.toggle("dark", prefersDark);
      }

      applyTheme();

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            }
          });
        },
        {
          rootMargin: "0px 0px -8% 0px",
          threshold: 0.08,
        },
      );

      revealElements.forEach((element, index) => {
        element.style.transitionDelay = `${Math.min(index * 55, 360)}ms`;
        observer.observe(element);
      });

      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        let rafId = null;
        let pointerX = window.innerWidth / 2;
        let pointerY = window.innerHeight / 2;
        let currentX = pointerX;
        let currentY = pointerY;

        const updateParallax = () => {
          currentX += (pointerX - currentX) * 0.08;
          currentY += (pointerY - currentY) * 0.08;

          const centeredX = currentX / window.innerWidth - 0.5;
          const centeredY = currentY / window.innerHeight - 0.5;

          parallaxNodes.forEach((node) => {
            const depth = Number(node.getAttribute("data-parallax")) || 10;
            node.style.setProperty("--tx", `${centeredX * depth * 2}px`);
            node.style.setProperty("--ty", `${centeredY * depth * 2}px`);
          });

          rafId = requestAnimationFrame(updateParallax);
        };

        window.addEventListener(
          "pointermove",
          (event) => {
            pointerX = event.clientX;
            pointerY = event.clientY;
          },
          { passive: true },
        );

        rafId = requestAnimationFrame(updateParallax);

        window.addEventListener("beforeunload", () => {
          if (rafId) {
            cancelAnimationFrame(rafId);
          }
        });
      }
    </script>
