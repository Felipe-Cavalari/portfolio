    <style>
      :root {
        color-scheme: dark;
      }

      @font-face {
        font-family: "futurism";
        src: url("../fonts/futurism.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #0f172a;
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        color: #f1f5f9;
        overflow-x: hidden;
      }

      /* ── Aurora Background ── */
      .bg-aurora {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .orb {
        position: absolute;
        border-radius: 9999px;
        filter: blur(90px);
        pointer-events: none;
        will-change: transform;
      }

      .orb-1 {
        width: 520px;
        height: 520px;
        top: -140px;
        right: -100px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.32) 0%,
          rgba(59, 130, 246, 0) 70%
        );
        animation: orbDrift1 22s ease-in-out infinite;
      }

      .orb-2 {
        width: 620px;
        height: 620px;
        bottom: -180px;
        left: -120px;
        background: radial-gradient(
          circle,
          rgba(28, 68, 133, 0.42) 0%,
          rgba(28, 68, 133, 0) 70%
        );
        animation: orbDrift2 28s ease-in-out infinite;
      }

      .orb-3 {
        width: 380px;
        height: 380px;
        top: 38%;
        left: 20%;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.16) 0%,
          rgba(99, 102, 241, 0) 70%
        );
        animation: orbDrift3 19s ease-in-out infinite;
      }

      @keyframes orbDrift1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(-28px, 22px) scale(1.06);
        }
        66% {
          transform: translate(18px, -16px) scale(0.94);
        }
      }

      @keyframes orbDrift2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(24px, -28px) scale(1.1);
        }
        66% {
          transform: translate(-18px, 24px) scale(0.9);
        }
      }

      @keyframes orbDrift3 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
          opacity: 0.7;
        }
        50% {
          transform: translate(-36px, 28px) scale(1.25);
          opacity: 0.4;
        }
      }

      /* Grain overlay */
      .grain::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.14;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.13) 0.45px,
          transparent 0.45px
        );
        background-size: 3px 3px;
      }

      /* ── Card ── */
      .bio-card {
        background: rgba(14, 22, 44, 0.58);
        border: 1px solid rgba(203, 213, 225, 0.13);
        box-shadow:
          0 36px 90px rgba(2, 8, 23, 0.62),
          0 0 0 1px rgba(255, 255, 255, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        position: relative;
        overflow: hidden;
      }

      /* Shine overlay */
      .bio-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          148deg,
          rgba(255, 255, 255, 0.07) 0%,
          rgba(255, 255, 255, 0) 38%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* Top aurora shimmer */
      .card-shimmer {
        position: absolute;
        inset-x: 0;
        top: 0;
        height: 180px;
        border-radius: inherit;
        background: linear-gradient(
          180deg,
          rgba(59, 130, 246, 0.13) 0%,
          rgba(99, 102, 241, 0.06) 50%,
          transparent 100%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Avatar Rotating Ring ── */
      .avatar-wrap {
        position: relative;
        width: 128px;
        height: 128px;
        flex-shrink: 0;
      }

      .avatar-glow {
        position: absolute;
        inset: -14px;
        border-radius: 9999px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.22) 0%,
          transparent 70%
        );
        animation: glowPulse 3.5s ease-in-out infinite;
      }

      @keyframes glowPulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.12);
        }
      }

      .avatar-ring {
        position: absolute;
        inset: -3px;
        border-radius: 9999px;
        background: conic-gradient(
          from 0deg,
          #3b82f6,
          #818cf8,
          #06b6d4,
          #8b5cf6,
          #3b82f6
        );
        animation: spinRing 3.2s linear infinite;
        will-change: transform;
      }

      @keyframes spinRing {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .avatar-mask {
        position: absolute;
        inset: 3px;
        border-radius: 9999px;
        background: #0e1629;
        overflow: hidden;
        z-index: 1;
      }

      .avatar-mask img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* ── Name gradient ── */
      .name-gradient {
        background: linear-gradient(
          130deg,
          #f1f5f9 0%,
          #93c5fd 45%,
          #c4b5fd 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Typewriter ── */
      #typewriter-text {
        border-right: 2px solid #3b82f6;
        display: inline-block;
        animation: cursorBlink 0.85s step-end infinite;
        min-width: 4px;
      }

      @keyframes cursorBlink {
        0%,
        100% {
          border-color: #3b82f6;
        }
        50% {
          border-color: transparent;
        }
      }

      /* ── Availability badge ── */
      .avail-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #22c55e;
        flex-shrink: 0;
        animation: dotPulse 2.2s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45);
        }
        60% {
          box-shadow: 0 0 0 7px rgba(34, 197, 94, 0);
        }
      }

      /* ── Tech pills ── */
      .tech-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 11px;
        border-radius: 9999px;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.01em;
        background: rgba(59, 130, 246, 0.09);
        border: 1px solid rgba(59, 130, 246, 0.22);
        color: #93c5fd;
        transition:
          background 0.22s ease,
          border-color 0.22s ease,
          transform 0.22s ease;
        cursor: default;
      }

      .tech-pill:hover {
        background: rgba(59, 130, 246, 0.18);
        border-color: rgba(59, 130, 246, 0.48);
        transform: translateY(-2px);
      }

      /* ── Stat card ── */
      .stat-item {
        padding: 0.875rem 0.5rem;
        text-align: center;
      }

      .stat-num {
        display: block;
        font-size: 1.45rem;
        font-weight: 700;
        background: linear-gradient(135deg, #f1f5f9 0%, #93c5fd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }

      .stat-lbl {
        display: block;
        font-size: 0.68rem;
        color: #64748b;
        margin-top: 2px;
        font-weight: 500;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      /* ── Link Cards ── */
      .link-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.875rem 1.1rem;
        border-radius: 1rem;
        background: rgba(16, 26, 50, 0.44);
        border: 1px solid rgba(203, 213, 225, 0.09);
        transition:
          transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
          background 0.3s ease,
          border-color 0.3s ease,
          box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }

      /* Left accent bar */
      .link-card::after {
        content: "";
        position: absolute;
        left: 0;
        top: 12%;
        bottom: 12%;
        width: 2.5px;
        border-radius: 0 3px 3px 0;
        background: var(--accent-col, #3b82f6);
        transform: scaleY(0);
        transform-origin: center;
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Shimmer sweep */
      .link-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -110%;
        width: 55%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.038),
          transparent
        );
        transition: left 0.5s ease;
        pointer-events: none;
      }

      .link-card:hover {
        transform: translateX(5px);
        background: rgba(22, 36, 66, 0.72);
        border-color: rgba(203, 213, 225, 0.18);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .link-card:hover::after {
        transform: scaleY(1);
      }

      .link-card:hover::before {
        left: 155%;
      }

      .link-card:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 3px;
      }

      /* Icon badge */
      .icon-badge {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          transform 0.28s ease,
          background 0.28s ease;
      }

      .link-card:hover .icon-badge {
        transform: scale(1.08);
      }

      /* Arrow icon */
      .card-arrow {
        color: #475569;
        transition:
          transform 0.28s ease,
          color 0.28s ease;
        flex-shrink: 0;
      }

      .link-card:hover .card-arrow {
        transform: translateX(5px);
        color: #94a3b8;
      }

      /* ── Reveal animation ── */
      .reveal {
        opacity: 0;
        transform: translate3d(0, 18px, 0);
        transition:
          opacity 0.6s ease,
          transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .reveal.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      /* ── Divider ── */
      .fade-divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(203, 213, 225, 0.14) 30%,
          rgba(203, 213, 225, 0.14) 70%,
          transparent
        );
      }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .orb-1 {
          width: 320px;
          height: 320px;
        }
        .orb-2 {
          width: 360px;
          height: 360px;
        }
        .orb-3 {
          display: none;
        }
        .avatar-wrap {
          width: 110px;
          height: 110px;
        }
      }

      /* ── Reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

    <script>
      // ── Typewriter ──
      const roles = [
        "Software Developer",
        "Full Stack Engineer",
        "Mobile Developer",
        "UI/UX Enthusiast",
      ];

      const twEl = document.getElementById("typewriter-text");
      let roleIdx = 0,
        charIdx = 0,
        deleting = false;

      function type() {
        const word = roles[roleIdx];
        if (deleting) {
          twEl.textContent = word.slice(0, --charIdx);
        } else {
          twEl.textContent = word.slice(0, ++charIdx);
        }

        let wait = deleting ? 55 : 95;
        if (!deleting && charIdx === word.length) {
          wait = 2400;
          deleting = true;
        } else if (deleting && charIdx === 0) {
          deleting = false;
          roleIdx = (roleIdx + 1) % roles.length;
          wait = 380;
        }

        setTimeout(type, wait);
      }

      setTimeout(type, 900);

      // ── Reveal on scroll ──
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("is-visible");
              observer.unobserve(e.target);
            }
          });
        },
        { rootMargin: "0px 0px -4% 0px", threshold: 0.05 },
      );

      document.querySelectorAll(".reveal").forEach((el, i) => {
        el.style.transitionDelay = `${Math.min(i * 65, 440)}ms`;
        observer.observe(el);
      });

      // ── Parallax orbs ──
      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        const orbs = document.querySelectorAll(".orb");
        let px = innerWidth / 2,
          py = innerHeight / 2;
        let cx = px,
          cy = py;
        const depths = [0.018, 0.012, 0.024];

        (function tick() {
          cx += (px - cx) * 0.07;
          cy += (py - cy) * 0.07;
          const dx = cx / innerWidth - 0.5;
          const dy = cy / innerHeight - 0.5;
          orbs.forEach((orb, i) => {
            const d = depths[i] || 0.015;
            orb.style.transform = `translate(${dx * innerWidth * d}px, ${dy * innerHeight * d}px)`;
          });
          requestAnimationFrame(tick);
        })();

        window.addEventListener(
          "pointermove",
          (e) => {
            px = e.clientX;
            py = e.clientY;
          },
          { passive: true },
        );
      }
    </script>
